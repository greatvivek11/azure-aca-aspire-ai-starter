services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    
    volumes:
      # Mount the repo at a fixed path so the setup is fork/rename-proof
      # (independent of the host folder name).
      - ..:/workspaces/app:cached
      # Isolate the container's Linux node_modules from the host's (Mac/Windows)
      # native binaries. This volume only exists inside the container.
      - frontend-node-modules:/workspaces/app/src/frontend/node_modules
    
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
    
    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)
    ports:
      - "8080:8080"
      - "8443:8443"
    
    networks:
      - aspire-network

networks:
  aspire-network:
    driver: bridge

volumes:
  frontend-node-modules:
