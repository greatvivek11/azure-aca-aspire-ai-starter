name: Reusable Deploy to Azure

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment
        required: false
        type: string
        default: dev
    secrets:
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_LOCATION:
        required: false
      AZD_ENVIRONMENT_NAME:
        required: false
      AZURE_RESOURCE_GROUP:
        required: false
      AZURE_RESOURCE_NAME_PREFIX:
        required: false
      AZURE_SQL_LOCATION:
        required: false
      AZURE_SQL_DATABASE_NAME:
        required: false
      SQL_PROVISIONING_MODE:
        required: false
      AZURE_SQL_EXISTING_SERVER_NAME:
        required: false
      AZURE_SQL_EXISTING_DATABASE_NAME:
        required: false
      AI_SERVICES_PROVISIONING_MODE:
        required: false
      AZURE_AI_SERVICES_ACCOUNT_NAME:
        required: false
      AZURE_AI_FOUNDRY_PROJECT_NAME:
        required: false
      AZURE_AI_FOUNDRY_PROJECT_PROVISIONING_MODE:
        required: false
      AZURE_OPENAI_AUTH_MODE:
        required: false
      AZURE_OPENAI_CHAT_MODEL_NAME:
        required: false
      AZURE_OPENAI_CHAT_MODEL_VERSION:
        required: false
      AZURE_OPENAI_EMBEDDING_MODEL_ID:
        required: false
      AZURE_OPENAI_EMBEDDING_MODEL_NAME:
        required: false
      AZURE_OPENAI_EMBEDDING_MODEL_VERSION:
        required: false
      AZURE_OPENAI_EMBEDDING_DIMENSIONS:
        required: false
      AZURE_STORAGE_ACCOUNT_NAME:
        required: false
      AZURE_STORAGE_DOCUMENTS_CONTAINER:
        required: false
      AZURE_STORAGE_AUTH_MODE:
        required: false
      BLOB_CORS_ALLOWED_ORIGINS_JSON:
        required: false
      AZURE_SEARCH_SERVICE_NAME:
        required: false
      AZURE_SEARCH_LOCATION:
        required: false
      AZURE_SEARCH_PROVISIONING_MODE:
        required: false
      AZURE_SEARCH_FAILOVER_ENABLED:
        required: false
      AZURE_SEARCH_FALLBACK_LOCATIONS:
        required: false
      AZURE_SEARCH_INDEX_NAME:
        required: false
      AZURE_SEARCH_AUTH_MODE:
        required: false
      AZURE_OPENAI_API_KEY:
        required: false
      AZURE_OPENAI_MODEL_ID:
        required: false
      AZURE_OPENAI_ENDPOINT:
        required: false
      AI_MODE:
        required: false
      AZURE_SQL_ADMIN_LOGIN:
        required: false
      AZURE_SQL_ADMIN_PASSWORD:
        required: false
      CONTAINER_REGISTRY_MODE:
        required: false
      EXTERNAL_REGISTRY_SERVER:
        required: false
      EXTERNAL_REGISTRY_USERNAME:
        required: false
      EXTERNAL_REGISTRY_PASSWORD:
        required: false
      ENABLE_LOG_ANALYTICS:
        required: false
      ENABLE_ASPIRE_DASHBOARD:
        required: false
      BACKEND_MIN_REPLICAS:
        required: false
      FRONTEND_MIN_REPLICAS:
        required: false
      WORKER_MIN_REPLICAS:
        required: false

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_LOCATION: ${{ secrets.AZURE_LOCATION || 'southindia' }}
      AZD_ENVIRONMENT_NAME: ${{ secrets.AZD_ENVIRONMENT_NAME || 'azure-aca-aspire-ai-starter' }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP || '' }}
      AZURE_RESOURCE_NAME_PREFIX: ${{ secrets.AZURE_RESOURCE_NAME_PREFIX || 'aih-azure-aca-aspire-ai-starter' }}
      AZURE_SQL_LOCATION: ${{ secrets.AZURE_SQL_LOCATION || '' }}
      AZURE_SQL_DATABASE_NAME: ${{ secrets.AZURE_SQL_DATABASE_NAME || 'acaaspireaistarter' }}
      SQL_PROVISIONING_MODE: ${{ secrets.SQL_PROVISIONING_MODE || 'provision' }}
      AZURE_SQL_EXISTING_SERVER_NAME: ${{ secrets.AZURE_SQL_EXISTING_SERVER_NAME || '' }}
      AZURE_SQL_EXISTING_DATABASE_NAME: ${{ secrets.AZURE_SQL_EXISTING_DATABASE_NAME || '' }}
      AI_SERVICES_PROVISIONING_MODE: ${{ secrets.AI_SERVICES_PROVISIONING_MODE || 'provision' }}
      AZURE_AI_SERVICES_ACCOUNT_NAME: ${{ secrets.AZURE_AI_SERVICES_ACCOUNT_NAME || '' }}
      AZURE_AI_FOUNDRY_PROJECT_NAME: ${{ secrets.AZURE_AI_FOUNDRY_PROJECT_NAME || 'enterprise-copilot' }}
      AZURE_AI_FOUNDRY_PROJECT_PROVISIONING_MODE: ${{ secrets.AZURE_AI_FOUNDRY_PROJECT_PROVISIONING_MODE || 'cli' }}
      AZURE_OPENAI_AUTH_MODE: ${{ secrets.AZURE_OPENAI_AUTH_MODE || 'managed-identity' }}
      AZURE_OPENAI_CHAT_MODEL_NAME: ${{ secrets.AZURE_OPENAI_CHAT_MODEL_NAME || 'gpt-5.1' }}
      AZURE_OPENAI_CHAT_MODEL_VERSION: ${{ secrets.AZURE_OPENAI_CHAT_MODEL_VERSION || '2025-11-13' }}
      AZURE_OPENAI_EMBEDDING_MODEL_ID: ${{ secrets.AZURE_OPENAI_EMBEDDING_MODEL_ID || 'text-embedding-3-small' }}
      AZURE_OPENAI_EMBEDDING_MODEL_NAME: ${{ secrets.AZURE_OPENAI_EMBEDDING_MODEL_NAME || 'text-embedding-3-small' }}
      AZURE_OPENAI_EMBEDDING_MODEL_VERSION: ${{ secrets.AZURE_OPENAI_EMBEDDING_MODEL_VERSION || '1' }}
      AZURE_OPENAI_EMBEDDING_DIMENSIONS: ${{ secrets.AZURE_OPENAI_EMBEDDING_DIMENSIONS || '1536' }}
      AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME || '' }}
      AZURE_STORAGE_DOCUMENTS_CONTAINER: ${{ secrets.AZURE_STORAGE_DOCUMENTS_CONTAINER || 'documents' }}
      AZURE_STORAGE_AUTH_MODE: ${{ secrets.AZURE_STORAGE_AUTH_MODE || 'managed-identity' }}
      BLOB_CORS_ALLOWED_ORIGINS_JSON: ${{ secrets.BLOB_CORS_ALLOWED_ORIGINS_JSON || '' }}
      AZURE_SEARCH_SERVICE_NAME: ${{ secrets.AZURE_SEARCH_SERVICE_NAME || '' }}
      AZURE_SEARCH_LOCATION: ${{ secrets.AZURE_SEARCH_LOCATION || secrets.AZURE_LOCATION || 'southindia' }}
      AZURE_SEARCH_PROVISIONING_MODE: ${{ secrets.AZURE_SEARCH_PROVISIONING_MODE || 'provision' }}
      AZURE_SEARCH_FAILOVER_ENABLED: ${{ secrets.AZURE_SEARCH_FAILOVER_ENABLED || 'false' }}
      AZURE_SEARCH_FALLBACK_LOCATIONS: ${{ secrets.AZURE_SEARCH_FALLBACK_LOCATIONS || '' }}
      AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME || 'documents-index' }}
      AZURE_SEARCH_AUTH_MODE: ${{ secrets.AZURE_SEARCH_AUTH_MODE || 'api-key' }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AI_MODE: ${{ secrets.AI_MODE || 'azure' }}
      AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
      AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
      CONTAINER_REGISTRY_MODE: ${{ secrets.CONTAINER_REGISTRY_MODE || 'external' }}
      EXTERNAL_REGISTRY_SERVER: ${{ secrets.EXTERNAL_REGISTRY_SERVER || 'ghcr.io' }}
      EXTERNAL_REGISTRY_USERNAME: ${{ secrets.EXTERNAL_REGISTRY_USERNAME || '' }}
      EXTERNAL_REGISTRY_PASSWORD: ${{ secrets.EXTERNAL_REGISTRY_PASSWORD || '' }}
      ENABLE_LOG_ANALYTICS: ${{ secrets.ENABLE_LOG_ANALYTICS || 'false' }}
      ENABLE_ASPIRE_DASHBOARD: ${{ secrets.ENABLE_ASPIRE_DASHBOARD || 'true' }}
      BACKEND_MIN_REPLICAS: ${{ secrets.BACKEND_MIN_REPLICAS || '0' }}
      FRONTEND_MIN_REPLICAS: ${{ secrets.FRONTEND_MIN_REPLICAS || '0' }}
      WORKER_MIN_REPLICAS: ${{ secrets.WORKER_MIN_REPLICAS || '0' }}
      BACKEND_IMAGE: mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
      FRONTEND_IMAGE: mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
      WORKER_IMAGE: mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
    environment:
      name: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://aka.ms/install-azd.sh | bash
          command -v azd
          azd version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate container registry mode inputs
        run: bash scripts/ci/validate-container-registry-mode.sh

      - name: Validate AI services mode inputs
        run: bash scripts/ci/validate-ai-services-mode.sh

      - name: Validate Foundry project provisioning mode inputs
        run: bash scripts/ci/validate-foundry-project-mode.sh

      - name: Validate Bicep parameter wiring
        run: bash scripts/ci/validate-bicep-parameter-wiring.sh

      - name: Resolve external image coordinates
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        run: bash scripts/ci/resolve-external-image-coordinates.sh

      - name: Log in to GHCR
        if: env.CONTAINER_REGISTRY_MODE == 'external' && env.EXTERNAL_REGISTRY_SERVER == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to external registry
        if: env.CONTAINER_REGISTRY_MODE == 'external' && env.EXTERNAL_REGISTRY_SERVER != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.EXTERNAL_REGISTRY_SERVER }}
          username: ${{ env.EXTERNAL_REGISTRY_USERNAME }}
          password: ${{ env.EXTERNAL_REGISTRY_PASSWORD }}

      - name: Build and push backend image
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend image
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      - name: Build and push worker image
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        uses: docker/build-push-action@v6
        with:
          context: ./src/worker
          file: ./src/worker/Dockerfile
          push: true
          tags: ${{ env.WORKER_IMAGE }}

      - name: Ensure GHCR package visibility or registry auth fallback
        if: env.CONTAINER_REGISTRY_MODE == 'external' && env.EXTERNAL_REGISTRY_SERVER == 'ghcr.io'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/ci/ensure-ghcr-visibility.sh

      - name: Log in to Azure using OIDC
        run: bash scripts/ci/login-azure-oidc.sh

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Set azd environment location
        run: bash scripts/ci/set-azd-environment-location.sh

      - name: Show effective azd environment values
        shell: bash
        run: |
          echo "AZD_ENVIRONMENT_NAME=${AZD_ENVIRONMENT_NAME}"
          azd env get-values | grep -E "AZURE_RESOURCE_GROUP|AZURE_LOCATION|AZURE_SQL_LOCATION|AZURE_ENV_NAME" || true

      - name: Verify Azure CLI context
        run: az account show --output table

      - name: Resolve SQL Entra admin from OIDC principal
        run: bash scripts/ci/resolve-sql-entra-admin.sh

      - name: Validate Azure Environment
        run: |
          bash scripts/validate-azure-env.sh \
            "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            "${DEPLOY_RESOURCE_GROUP}" \
            "${AZURE_LOCATION}"

      - name: Validate SQL admin login format
        run: bash scripts/ci/validate-deploy-inputs.sh sql-admin-login

      - name: Validate SQL provisioning mode inputs
        run: bash scripts/ci/validate-deploy-inputs.sh sql-provisioning

      - name: Validate Azure AI Search provisioning mode inputs
        run: bash scripts/ci/validate-deploy-inputs.sh search-provisioning

      - name: Validate Azure AI Search failover inputs
        run: bash scripts/ci/validate-deploy-inputs.sh search-failover

      - name: Pre-enable Foundry account managed identity
        run: bash scripts/ci/preenable-foundry-identity.sh

      - name: Provision Infrastructure with Azure Developer CLI
        run: bash scripts/ci/provision-with-search-failover.sh

      - name: Ensure Foundry project exists (CLI mode)
        run: bash scripts/ci/ensure-foundry-project.sh

      - name: Regional diagnostics after failed provision
        if: failure()
        run: bash scripts/ci/regional-diagnostics.sh

      - name: Grant backend UAMI SQL roles (provision mode)
        shell: pwsh
        env:
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
        run: ./scripts/ci/grant-backend-uami-sql-roles.ps1

      - name: Deploy Backend Service
        if: env.CONTAINER_REGISTRY_MODE == 'managed'
        run: azd deploy backend --no-prompt

      - name: Deploy Frontend Service
        if: env.CONTAINER_REGISTRY_MODE == 'managed'
        run: azd deploy frontend --no-prompt

      - name: Deploy Worker Service
        if: env.CONTAINER_REGISTRY_MODE == 'managed'
        run: azd deploy worker --no-prompt

      - name: Finalize external image deployment
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        shell: bash
        run: |
          echo "External registry mode provisioned ACA with prebuilt images:"
          echo "  Backend:  ${BACKEND_IMAGE}"
          echo "  Frontend: ${FRONTEND_IMAGE}"
          echo "  Worker:   ${WORKER_IMAGE}"

      - name: Get Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Environment: ${AZD_ENVIRONMENT_NAME}"
          echo "Subscription: ${AZURE_SUBSCRIPTION_ID}"

      - name: Notify Deployment Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Success' : '❌ Failed';
            console.log(`Deployment ${status}`);

      - name: Deployment Summary Report
        if: always()
        shell: bash
        run: |
          {
            echo "## Deployment Run Summary"
            echo ""
            echo "- Job status: ${{ job.status }}"
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Run ID: ${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo ""
            echo "If this run failed, inspect the first failed step in the Actions UI and expand its logs."
          } >> "$GITHUB_STEP_SUMMARY"
