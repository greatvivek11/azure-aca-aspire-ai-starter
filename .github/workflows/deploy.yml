name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZD_ENVIRONMENT_NAME: ${{ secrets.AZD_ENVIRONMENT_NAME || 'copilot-sk-azure' }}
  SQL_PROVISIONING_MODE: ${{ secrets.SQL_PROVISIONING_MODE || 'provision' }}
  AZURE_SQL_EXISTING_SERVER_NAME: ${{ secrets.AZURE_SQL_EXISTING_SERVER_NAME || '' }}
  AZURE_SQL_EXISTING_DATABASE_NAME: ${{ secrets.AZURE_SQL_EXISTING_DATABASE_NAME || '' }}

jobs:
  validate:
    name: Validate and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies
        run: dotnet restore copilot-sk.sln

      - name: Build Backend
        run: dotnet build copilot-sk.sln --configuration Release --no-restore

      - name: Run Architecture Tests
        run: dotnet test src/Backend.Tests/Backend.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Build Frontend
        working-directory: src/frontend
        run: |
          npm install
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            src/backend/bin/Release/
            src/frontend/dist/
            src/aspire/bin/Release/
            src/worker/bin/Release/

  deploy:
    name: Deploy to Azure
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Log in to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Verify Azure CLI context
        run: az account show --output table

      - name: Resolve SQL Entra admin from OIDC principal
        shell: bash
        run: |
          set -euo pipefail

          SP_OBJECT_ID="$(az ad sp show --id "${AZURE_CLIENT_ID}" --query id -o tsv)"
          SP_DISPLAY_NAME="$(az ad sp show --id "${AZURE_CLIENT_ID}" --query displayName -o tsv)"

          if [[ -z "${SP_OBJECT_ID}" || -z "${SP_DISPLAY_NAME}" ]]; then
            echo "Unable to resolve service principal metadata for SQL Entra admin configuration."
            exit 1
          fi

          echo "AZURE_SQL_ENTRA_ADMIN_OBJECT_ID=${SP_OBJECT_ID}" >> "$GITHUB_ENV"
          echo "AZURE_SQL_ENTRA_ADMIN_LOGIN=${SP_DISPLAY_NAME}" >> "$GITHUB_ENV"

          echo "Resolved SQL Entra admin from OIDC principal: ${SP_DISPLAY_NAME} (${SP_OBJECT_ID})"

      - name: Validate Azure Environment
        run: |
          bash scripts/validate-azure-env.sh \
            "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            "aihub-rg"

      - name: Validate SQL admin login format
        shell: bash
        env:
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
          AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          mode_lower="$(echo "${SQL_PROVISIONING_MODE:-provision}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${mode_lower}" == "existing" ]]; then
            echo "SQL_PROVISIONING_MODE=existing; skipping SQL admin credential validation."
            exit 0
          fi

          if [ -z "${AZURE_SQL_ADMIN_LOGIN:-}" ]; then
            echo "AZURE_SQL_ADMIN_LOGIN secret is required."
            exit 1
          fi

          if [ -z "${AZURE_SQL_ADMIN_PASSWORD:-}" ]; then
            echo "AZURE_SQL_ADMIN_PASSWORD secret is required."
            exit 1
          fi

          login_lower="$(echo "${AZURE_SQL_ADMIN_LOGIN}" | tr '[:upper:]' '[:lower:]')"

          # Azure SQL rejects commonly reserved admin names.
          case "${login_lower}" in
            admin|administrator|sa|root|guest|public)
              echo "AZURE_SQL_ADMIN_LOGIN '${AZURE_SQL_ADMIN_LOGIN}' is reserved/invalid for Azure SQL."
              echo "Use a non-reserved value like 'sqladmincopilot'."
              exit 1
              ;;
          esac

          if ! echo "${AZURE_SQL_ADMIN_LOGIN}" | grep -Eq '^[A-Za-z][A-Za-z0-9_]{2,127}$'; then
            echo "AZURE_SQL_ADMIN_LOGIN must start with a letter and contain only letters, digits, or underscore (3-128 chars)."
            exit 1
          fi

      - name: Validate SQL provisioning mode inputs
        shell: bash
        env:
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
          AZURE_SQL_EXISTING_SERVER_NAME: ${{ env.AZURE_SQL_EXISTING_SERVER_NAME }}
          AZURE_SQL_EXISTING_DATABASE_NAME: ${{ env.AZURE_SQL_EXISTING_DATABASE_NAME }}
        run: |
          set -euo pipefail

          mode_lower="$(echo "${SQL_PROVISIONING_MODE:-provision}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${mode_lower}" != "provision" && "${mode_lower}" != "existing" ]]; then
            echo "SQL_PROVISIONING_MODE must be 'provision' or 'existing'."
            exit 1
          fi

          if [[ "${mode_lower}" == "existing" ]]; then
            if [[ -z "${AZURE_SQL_EXISTING_SERVER_NAME:-}" || -z "${AZURE_SQL_EXISTING_DATABASE_NAME:-}" ]]; then
              echo "When SQL_PROVISIONING_MODE=existing, set AZURE_SQL_EXISTING_SERVER_NAME and AZURE_SQL_EXISTING_DATABASE_NAME."
              exit 1
            fi
          fi

          echo "SQL provisioning mode validated: ${mode_lower}"

      - name: Provision Infrastructure with Azure Developer CLI
        run: azd provision --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
          AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
          AZURE_SQL_ENTRA_ADMIN_LOGIN: ${{ env.AZURE_SQL_ENTRA_ADMIN_LOGIN }}
          AZURE_SQL_ENTRA_ADMIN_OBJECT_ID: ${{ env.AZURE_SQL_ENTRA_ADMIN_OBJECT_ID }}
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
          AZURE_SQL_EXISTING_SERVER_NAME: ${{ env.AZURE_SQL_EXISTING_SERVER_NAME }}
          AZURE_SQL_EXISTING_DATABASE_NAME: ${{ env.AZURE_SQL_EXISTING_DATABASE_NAME }}

      - name: Grant backend UAMI SQL roles (provision mode)
        shell: pwsh
        env:
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
        run: |
          $ErrorActionPreference = 'Stop'

          $mode = "${env:SQL_PROVISIONING_MODE}".ToLowerInvariant()
          if ($mode -eq "existing") {
            Write-Host "SQL_PROVISIONING_MODE=existing; skipping automatic SQL role grants for UAMI."
            exit 0
          }

          $sqlServer = azd env get-value AZURE_SQL_SERVER_NAME
          $sqlDatabase = azd env get-value AZURE_SQL_DATABASE_NAME
          $uamiName = azd env get-value UAMI_NAME

          if ([string]::IsNullOrWhiteSpace($sqlServer) -or [string]::IsNullOrWhiteSpace($sqlDatabase) -or [string]::IsNullOrWhiteSpace($uamiName)) {
            throw "Missing required azd outputs for SQL role grant. Expected AZURE_SQL_SERVER_NAME, AZURE_SQL_DATABASE_NAME, and UAMI_NAME."
          }

          $token = az account get-access-token --resource https://database.windows.net/ --query accessToken -o tsv
          if ([string]::IsNullOrWhiteSpace($token)) {
            throw "Failed to acquire Azure SQL access token from current OIDC login."
          }

          $connectionString = "Server=tcp:$sqlServer.database.windows.net,1433;Initial Catalog=$sqlDatabase;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"

          $escapedUamiName = $uamiName.Replace("'", "''")

            $sql = @"
            DECLARE @principal sysname = N'$escapedUamiName';

            IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = @principal)
            BEGIN
              DECLARE @createUserSql nvarchar(max) = N'CREATE USER [' + REPLACE(@principal, ']', ']]') + N'] FROM EXTERNAL PROVIDER;';
              EXEC(@createUserSql);
            END;

            IF NOT EXISTS (
              SELECT 1
              FROM sys.database_role_members drm
              JOIN sys.database_principals r ON r.principal_id = drm.role_principal_id
              JOIN sys.database_principals m ON m.principal_id = drm.member_principal_id
              WHERE r.name = N'db_datareader' AND m.name = @principal
            )
            BEGIN
              DECLARE @addReaderSql nvarchar(max) = N'ALTER ROLE [db_datareader] ADD MEMBER [' + REPLACE(@principal, ']', ']]') + N'];';
              EXEC(@addReaderSql);
            END;

            IF NOT EXISTS (
              SELECT 1
              FROM sys.database_role_members drm
              JOIN sys.database_principals r ON r.principal_id = drm.role_principal_id
              JOIN sys.database_principals m ON m.principal_id = drm.member_principal_id
              WHERE r.name = N'db_datawriter' AND m.name = @principal
            )
            BEGIN
              DECLARE @addWriterSql nvarchar(max) = N'ALTER ROLE [db_datawriter] ADD MEMBER [' + REPLACE(@principal, ']', ']]') + N'];';
              EXEC(@addWriterSql);
            END;

            IF NOT EXISTS (
              SELECT 1
              FROM sys.database_role_members drm
              JOIN sys.database_principals r ON r.principal_id = drm.role_principal_id
              JOIN sys.database_principals m ON m.principal_id = drm.member_principal_id
              WHERE r.name = N'db_ddladmin' AND m.name = @principal
            )
            BEGIN
              DECLARE @addDdlSql nvarchar(max) = N'ALTER ROLE [db_ddladmin] ADD MEMBER [' + REPLACE(@principal, ']', ']]') + N'];';
              EXEC(@addDdlSql);
            END;
            "@

          Add-Type -AssemblyName System.Data
          $conn = New-Object System.Data.SqlClient.SqlConnection $connectionString
          $conn.AccessToken = $token
          $conn.Open()

          try {
            $cmd = $conn.CreateCommand()
            $cmd.CommandText = $sql
            [void]$cmd.ExecuteNonQuery()
            Write-Host "Granted SQL roles to UAMI '$uamiName' on database '$sqlDatabase'."
          }
          finally {
            $conn.Close()
          }

      - name: Deploy Backend Service
        run: azd deploy backend --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Deploy Frontend Service
        run: azd deploy frontend --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Deploy Worker Service
        run: azd deploy worker --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Get Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Environment: ${{ env.AZD_ENVIRONMENT_NAME }}"
          echo "Subscription: ${{ env.AZURE_SUBSCRIPTION_ID }}"

      - name: Notify Deployment Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Success' : '❌ Failed';
            console.log(`Deployment ${status}`);

      - name: Deployment Summary Report
        if: always()
        shell: bash
        run: |
          {
            echo "## Deployment Run Summary"
            echo ""
            echo "- Job status: ${{ job.status }}"
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Run ID: ${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo ""
            echo "If this run failed, inspect the first failed step in the Actions UI and expand its logs."
          } >> "$GITHUB_STEP_SUMMARY"
