name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  validate:
    name: Validate and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint GitHub workflows
        run: bash scripts/lint-workflows.sh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies
        run: dotnet restore copilot-sk.sln

      - name: Build Backend
        run: dotnet build copilot-sk.sln --configuration Release --no-restore

      - name: Run Architecture Tests
        run: dotnet test src/Backend.Tests/Backend.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Build Frontend
        working-directory: src/frontend
        run: |
          npm install
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            src/backend/bin/Release/
            src/frontend/dist/
            src/aspire/bin/Release/
            src/worker/bin/Release/

  deploy:
    name: Deploy to Azure
    needs: validate
    runs-on: ubuntu-latest
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_LOCATION: ${{ secrets.AZURE_LOCATION || 'southindia' }}
      AZD_ENVIRONMENT_NAME: ${{ secrets.AZD_ENVIRONMENT_NAME || 'copilot-sk-azure' }}
      SQL_PROVISIONING_MODE: ${{ secrets.SQL_PROVISIONING_MODE || 'provision' }}
      AZURE_SQL_EXISTING_SERVER_NAME: ${{ secrets.AZURE_SQL_EXISTING_SERVER_NAME || '' }}
      AZURE_SQL_EXISTING_DATABASE_NAME: ${{ secrets.AZURE_SQL_EXISTING_DATABASE_NAME || '' }}
      AI_SERVICES_PROVISIONING_MODE: ${{ secrets.AI_SERVICES_PROVISIONING_MODE || 'provision' }}
      AZURE_AI_SERVICES_ACCOUNT_NAME: ${{ secrets.AZURE_AI_SERVICES_ACCOUNT_NAME || '' }}
      AZURE_AI_FOUNDRY_PROJECT_NAME: ${{ secrets.AZURE_AI_FOUNDRY_PROJECT_NAME || 'enterprise-copilot' }}
      AZURE_OPENAI_AUTH_MODE: ${{ secrets.AZURE_OPENAI_AUTH_MODE || 'managed-identity' }}
      AZURE_OPENAI_CHAT_MODEL_NAME: ${{ secrets.AZURE_OPENAI_CHAT_MODEL_NAME || 'gpt-5-mini' }}
      AZURE_OPENAI_CHAT_MODEL_VERSION: ${{ secrets.AZURE_OPENAI_CHAT_MODEL_VERSION || '' }}
      AZURE_OPENAI_EMBEDDING_MODEL_ID: ${{ secrets.AZURE_OPENAI_EMBEDDING_MODEL_ID || 'text-embedding-3-small' }}
      AZURE_OPENAI_EMBEDDING_MODEL_NAME: ${{ secrets.AZURE_OPENAI_EMBEDDING_MODEL_NAME || 'text-embedding-3-small' }}
      AZURE_OPENAI_EMBEDDING_MODEL_VERSION: ${{ secrets.AZURE_OPENAI_EMBEDDING_MODEL_VERSION || '1' }}
      AZURE_OPENAI_EMBEDDING_DIMENSIONS: ${{ secrets.AZURE_OPENAI_EMBEDDING_DIMENSIONS || '1536' }}
      AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME || '' }}
      AZURE_STORAGE_DOCUMENTS_CONTAINER: ${{ secrets.AZURE_STORAGE_DOCUMENTS_CONTAINER || 'documents' }}
      AZURE_STORAGE_AUTH_MODE: ${{ secrets.AZURE_STORAGE_AUTH_MODE || 'managed-identity' }}
      BLOB_CORS_ALLOWED_ORIGINS_JSON: ${{ secrets.BLOB_CORS_ALLOWED_ORIGINS_JSON || '' }}
      AZURE_SEARCH_SERVICE_NAME: ${{ secrets.AZURE_SEARCH_SERVICE_NAME || '' }}
      AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME || 'documents-index' }}
      AZURE_SEARCH_AUTH_MODE: ${{ secrets.AZURE_SEARCH_AUTH_MODE || 'api-key' }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
      AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
      CONTAINER_REGISTRY_MODE: ${{ secrets.CONTAINER_REGISTRY_MODE || 'external' }}
      EXTERNAL_REGISTRY_SERVER: ${{ secrets.EXTERNAL_REGISTRY_SERVER || 'ghcr.io' }}
      EXTERNAL_REGISTRY_USERNAME: ${{ secrets.EXTERNAL_REGISTRY_USERNAME || '' }}
      EXTERNAL_REGISTRY_PASSWORD: ${{ secrets.EXTERNAL_REGISTRY_PASSWORD || '' }}
      ENABLE_LOG_ANALYTICS: ${{ secrets.ENABLE_LOG_ANALYTICS || 'false' }}
      ENABLE_ASPIRE_DASHBOARD: ${{ secrets.ENABLE_ASPIRE_DASHBOARD || 'true' }}
      BACKEND_MIN_REPLICAS: ${{ secrets.BACKEND_MIN_REPLICAS || '0' }}
      FRONTEND_MIN_REPLICAS: ${{ secrets.FRONTEND_MIN_REPLICAS || '0' }}
      WORKER_MIN_REPLICAS: ${{ secrets.WORKER_MIN_REPLICAS || '0' }}
      BACKEND_IMAGE: mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
      FRONTEND_IMAGE: mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
      WORKER_IMAGE: mcr.microsoft.com/azuredocs/containerapps-helloworld:latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    concurrency:
      group: deploy-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://aka.ms/install-azd.sh | bash
          command -v azd
          azd version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate container registry mode inputs
        shell: bash
        run: |
          set -euo pipefail

          mode_lower="$(echo "${CONTAINER_REGISTRY_MODE:-external}" | tr '[:upper:]' '[:lower:]')"
          echo "CONTAINER_REGISTRY_MODE=${mode_lower}" >> "$GITHUB_ENV"

          if [[ "${mode_lower}" != "managed" && "${mode_lower}" != "external" ]]; then
            echo "CONTAINER_REGISTRY_MODE must be 'managed' or 'external'."
            exit 1
          fi

          if [[ "${mode_lower}" == "external" ]]; then
            if [[ -z "${EXTERNAL_REGISTRY_SERVER:-}" ]]; then
              echo "EXTERNAL_REGISTRY_SERVER is required when CONTAINER_REGISTRY_MODE=external."
              exit 1
            fi

            server_lower="$(echo "${EXTERNAL_REGISTRY_SERVER}" | tr '[:upper:]' '[:lower:]')"
            if [[ "${server_lower}" != "ghcr.io" && ( -z "${EXTERNAL_REGISTRY_USERNAME:-}" || -z "${EXTERNAL_REGISTRY_PASSWORD:-}" ) ]]; then
              echo "Authenticated external registries require EXTERNAL_REGISTRY_USERNAME and EXTERNAL_REGISTRY_PASSWORD."
              exit 1
            fi
          fi

      - name: Validate AI services mode inputs
        shell: bash
        run: |
          set -euo pipefail

          mode_lower="$(echo "${AI_SERVICES_PROVISIONING_MODE:-provision}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${mode_lower}" != "external" && "${mode_lower}" != "provision" ]]; then
            echo "AI_SERVICES_PROVISIONING_MODE must be 'external' or 'provision'."
            exit 1
          fi

          if [[ "${mode_lower}" == "external" ]]; then
            if [[ -z "${AZURE_OPENAI_ENDPOINT:-}" || -z "${AZURE_OPENAI_API_KEY:-}" || -z "${AZURE_OPENAI_MODEL_ID:-}" ]]; then
              echo "External AI mode requires AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, and AZURE_OPENAI_MODEL_ID secrets."
              exit 1
            fi
          fi

          echo "AI services mode validated: ${mode_lower}"

      - name: Resolve external image coordinates
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        shell: bash
        run: |
          set -euo pipefail

          server_lower="$(echo "${EXTERNAL_REGISTRY_SERVER}" | tr '[:upper:]' '[:lower:]')"
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lower="$(basename "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          {
            echo "EXTERNAL_REGISTRY_SERVER=${server_lower}"
            echo "BACKEND_IMAGE=${server_lower}/${owner_lower}/${repo_lower}-backend:${GITHUB_SHA}"
            echo "FRONTEND_IMAGE=${server_lower}/${owner_lower}/${repo_lower}-frontend:${GITHUB_SHA}"
            echo "WORKER_IMAGE=${server_lower}/${owner_lower}/${repo_lower}-worker:${GITHUB_SHA}"
          } >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: env.CONTAINER_REGISTRY_MODE == 'external' && env.EXTERNAL_REGISTRY_SERVER == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to external registry
        if: env.CONTAINER_REGISTRY_MODE == 'external' && env.EXTERNAL_REGISTRY_SERVER != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.EXTERNAL_REGISTRY_SERVER }}
          username: ${{ env.EXTERNAL_REGISTRY_USERNAME }}
          password: ${{ env.EXTERNAL_REGISTRY_PASSWORD }}

      - name: Build and push backend image
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend image
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      - name: Build and push worker image
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        uses: docker/build-push-action@v6
        with:
          context: ./src/worker
          file: ./src/worker/Dockerfile
          push: true
          tags: ${{ env.WORKER_IMAGE }}

      - name: Ensure GHCR package visibility or registry auth fallback
        if: env.CONTAINER_REGISTRY_MODE == 'external' && env.EXTERNAL_REGISTRY_SERVER == 'ghcr.io'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER}"
          repo_lower="$(basename "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          owner_type="$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/users/${owner}" | jq -r '.type')"

          if [[ "${owner_type}" == "Organization" ]]; then
            scope_path="orgs/${owner}"
          else
            scope_path="users/${owner}"
          fi

          packages=(
            "${repo_lower}-backend"
            "${repo_lower}-frontend"
            "${repo_lower}-worker"
          )

          for package_name in "${packages[@]}"; do
            visibility_url="https://api.github.com/${scope_path}/packages/container/${package_name}/visibility"
            package_url="https://api.github.com/${scope_path}/packages/container/${package_name}"

            status="$(curl -sS -o /tmp/ghcr_visibility_body.txt -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${visibility_url}" \
              -d '{"visibility":"public"}')"

            if [[ "${status}" != "204" && "${status}" != "422" ]]; then
              echo "GHCR visibility update for ${package_name} returned HTTP ${status}."
            fi

            visibility=""
            retries=5
            while (( retries > 0 )); do
              visibility="$(curl -sS \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${package_url}" | jq -r '.visibility // empty')"

              if [[ -n "${visibility}" ]]; then
                break
              fi
              retries=$((retries - 1))
              sleep 2
            done

            if [[ "${visibility}" != "public" ]]; then
              if [[ -z "${EXTERNAL_REGISTRY_USERNAME:-}" || -z "${EXTERNAL_REGISTRY_PASSWORD:-}" ]]; then
                echo "GHCR package '${package_name}' is not public and no registry credentials were provided."
                echo "Either make GHCR packages public or set EXTERNAL_REGISTRY_USERNAME/EXTERNAL_REGISTRY_PASSWORD so ACA can authenticate."
                exit 1
              fi
            fi
          done

      - name: Log in to Azure using OIDC
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "OIDC token request variables are missing. Ensure workflow permission id-token: write is enabled."
            exit 1
          fi

          federated_token="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')"

          if [[ -z "${federated_token}" || "${federated_token}" == "null" ]]; then
            echo "Failed to obtain federated OIDC token for Azure login."
            exit 1
          fi

          az login --service-principal \
            --username "${AZURE_CLIENT_ID}" \
            --tenant "${AZURE_TENANT_ID}" \
            --federated-token "${federated_token}" \
            --allow-no-subscriptions

          az account set --subscription "${AZURE_SUBSCRIPTION_ID}"

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Set azd environment location
        shell: bash
        run: |
          set -euo pipefail

          if azd env select "${AZD_ENVIRONMENT_NAME}" >/dev/null 2>&1; then
            echo "Selected existing azd environment '${AZD_ENVIRONMENT_NAME}'."
          else
            azd env new "${AZD_ENVIRONMENT_NAME}" --location "${AZURE_LOCATION}" --no-prompt
          fi

          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          echo "Using Azure location: ${AZURE_LOCATION}"

      - name: Verify Azure CLI context
        run: az account show --output table

      - name: Resolve SQL Entra admin from OIDC principal
        shell: bash
        run: |
          set -euo pipefail

          SP_OBJECT_ID="$(az ad sp show --id "${AZURE_CLIENT_ID}" --query id -o tsv)"
          SP_DISPLAY_NAME="$(az ad sp show --id "${AZURE_CLIENT_ID}" --query displayName -o tsv)"

          if [[ -z "${SP_OBJECT_ID}" || -z "${SP_DISPLAY_NAME}" ]]; then
            echo "Unable to resolve service principal metadata for SQL Entra admin configuration."
            exit 1
          fi

          echo "AZURE_SQL_ENTRA_ADMIN_OBJECT_ID=${SP_OBJECT_ID}" >> "$GITHUB_ENV"
          echo "AZURE_SQL_ENTRA_ADMIN_LOGIN=${SP_DISPLAY_NAME}" >> "$GITHUB_ENV"

          echo "Resolved SQL Entra admin from OIDC principal: ${SP_DISPLAY_NAME} (${SP_OBJECT_ID})"

      - name: Validate Azure Environment
        run: |
          bash scripts/validate-azure-env.sh \
            "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            "aihub-rg" \
            "${AZURE_LOCATION}"

      - name: Validate SQL admin login format
        shell: bash
        run: |
          set -euo pipefail

          mode_lower="$(echo "${SQL_PROVISIONING_MODE:-provision}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${mode_lower}" == "existing" ]]; then
            echo "SQL_PROVISIONING_MODE=existing; skipping SQL admin credential validation."
            exit 0
          fi

          if [ -z "${AZURE_SQL_ADMIN_LOGIN:-}" ]; then
            echo "AZURE_SQL_ADMIN_LOGIN secret is required."
            exit 1
          fi

          if [ -z "${AZURE_SQL_ADMIN_PASSWORD:-}" ]; then
            echo "AZURE_SQL_ADMIN_PASSWORD secret is required."
            exit 1
          fi

          login_lower="$(echo "${AZURE_SQL_ADMIN_LOGIN}" | tr '[:upper:]' '[:lower:]')"

          # Azure SQL rejects commonly reserved admin names.
          case "${login_lower}" in
            admin|administrator|sa|root|guest|public)
              echo "AZURE_SQL_ADMIN_LOGIN '${AZURE_SQL_ADMIN_LOGIN}' is reserved/invalid for Azure SQL."
              echo "Use a non-reserved value like 'sqladmincopilot'."
              exit 1
              ;;
          esac

          if ! echo "${AZURE_SQL_ADMIN_LOGIN}" | grep -Eq '^[A-Za-z][A-Za-z0-9_]{2,127}$'; then
            echo "AZURE_SQL_ADMIN_LOGIN must start with a letter and contain only letters, digits, or underscore (3-128 chars)."
            exit 1
          fi

      - name: Validate SQL provisioning mode inputs
        shell: bash
        run: |
          set -euo pipefail

          mode_lower="$(echo "${SQL_PROVISIONING_MODE:-provision}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${mode_lower}" != "provision" && "${mode_lower}" != "existing" ]]; then
            echo "SQL_PROVISIONING_MODE must be 'provision' or 'existing'."
            exit 1
          fi

          if [[ "${mode_lower}" == "existing" ]]; then
            if [[ -z "${AZURE_SQL_EXISTING_SERVER_NAME:-}" || -z "${AZURE_SQL_EXISTING_DATABASE_NAME:-}" ]]; then
              echo "When SQL_PROVISIONING_MODE=existing, set AZURE_SQL_EXISTING_SERVER_NAME and AZURE_SQL_EXISTING_DATABASE_NAME."
              exit 1
            fi
          fi

          echo "SQL provisioning mode validated: ${mode_lower}"

      - name: Provision Infrastructure with Azure Developer CLI
        run: azd provision --no-prompt

      - name: Grant backend UAMI SQL roles (provision mode)
        shell: pwsh
        env:
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
        run: |
          $ErrorActionPreference = 'Stop'

          $mode = "${env:SQL_PROVISIONING_MODE}".ToLowerInvariant()
          if ($mode -eq "existing") {
            Write-Host "SQL_PROVISIONING_MODE=existing; skipping automatic SQL role grants for UAMI."
            exit 0
          }

          $sqlServer = azd env get-value AZURE_SQL_SERVER_NAME
          $sqlDatabase = azd env get-value AZURE_SQL_DATABASE_NAME
          $uamiName = azd env get-value UAMI_NAME

          if ([string]::IsNullOrWhiteSpace($sqlServer) -or [string]::IsNullOrWhiteSpace($sqlDatabase) -or [string]::IsNullOrWhiteSpace($uamiName)) {
            throw "Missing required azd outputs for SQL role grant. Expected AZURE_SQL_SERVER_NAME, AZURE_SQL_DATABASE_NAME, and UAMI_NAME."
          }

          $token = az account get-access-token --resource https://database.windows.net/ --query accessToken -o tsv
          if ([string]::IsNullOrWhiteSpace($token)) {
            throw "Failed to acquire Azure SQL access token from current OIDC login."
          }

          $connectionString = "Server=tcp:$sqlServer.database.windows.net,1433;Initial Catalog=$sqlDatabase;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"

          $escapedUamiName = $uamiName.Replace("'", "''")

          $sql = @"
            DECLARE @principal sysname = N'$escapedUamiName';

            IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = @principal)
            BEGIN
              DECLARE @createUserSql nvarchar(max) = N'CREATE USER [' + REPLACE(@principal, ']', ']]') + N'] FROM EXTERNAL PROVIDER;';
              EXEC(@createUserSql);
            END;

            IF NOT EXISTS (
              SELECT 1
              FROM sys.database_role_members drm
              JOIN sys.database_principals r ON r.principal_id = drm.role_principal_id
              JOIN sys.database_principals m ON m.principal_id = drm.member_principal_id
              WHERE r.name = N'db_datareader' AND m.name = @principal
            )
            BEGIN
              DECLARE @addReaderSql nvarchar(max) = N'ALTER ROLE [db_datareader] ADD MEMBER [' + REPLACE(@principal, ']', ']]') + N'];';
              EXEC(@addReaderSql);
            END;

            IF NOT EXISTS (
              SELECT 1
              FROM sys.database_role_members drm
              JOIN sys.database_principals r ON r.principal_id = drm.role_principal_id
              JOIN sys.database_principals m ON m.principal_id = drm.member_principal_id
              WHERE r.name = N'db_datawriter' AND m.name = @principal
            )
            BEGIN
              DECLARE @addWriterSql nvarchar(max) = N'ALTER ROLE [db_datawriter] ADD MEMBER [' + REPLACE(@principal, ']', ']]') + N'];';
              EXEC(@addWriterSql);
            END;

            IF NOT EXISTS (
              SELECT 1
              FROM sys.database_role_members drm
              JOIN sys.database_principals r ON r.principal_id = drm.role_principal_id
              JOIN sys.database_principals m ON m.principal_id = drm.member_principal_id
              WHERE r.name = N'db_ddladmin' AND m.name = @principal
            )
            BEGIN
              DECLARE @addDdlSql nvarchar(max) = N'ALTER ROLE [db_ddladmin] ADD MEMBER [' + REPLACE(@principal, ']', ']]') + N'];';
              EXEC(@addDdlSql);
            END;
          "@

          Add-Type -AssemblyName System.Data
          $conn = New-Object System.Data.SqlClient.SqlConnection $connectionString
          $conn.AccessToken = $token
          $conn.Open()

          try {
            $cmd = $conn.CreateCommand()
            $cmd.CommandText = $sql
            [void]$cmd.ExecuteNonQuery()
            Write-Host "Granted SQL roles to UAMI '$uamiName' on database '$sqlDatabase'."
          }
          finally {
            $conn.Close()
          }

      - name: Deploy Backend Service
        if: env.CONTAINER_REGISTRY_MODE == 'managed'
        run: azd deploy backend --no-prompt

      - name: Deploy Frontend Service
        if: env.CONTAINER_REGISTRY_MODE == 'managed'
        run: azd deploy frontend --no-prompt

      - name: Deploy Worker Service
        if: env.CONTAINER_REGISTRY_MODE == 'managed'
        run: azd deploy worker --no-prompt

      - name: Finalize external image deployment
        if: env.CONTAINER_REGISTRY_MODE == 'external'
        shell: bash
        run: |
          echo "External registry mode provisioned ACA with prebuilt images:"
          echo "  Backend:  ${BACKEND_IMAGE}"
          echo "  Frontend: ${FRONTEND_IMAGE}"
          echo "  Worker:   ${WORKER_IMAGE}"

      - name: Get Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Environment: ${AZD_ENVIRONMENT_NAME}"
          echo "Subscription: ${AZURE_SUBSCRIPTION_ID}"

      - name: Notify Deployment Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Success' : '❌ Failed';
            console.log(`Deployment ${status}`);

      - name: Deployment Summary Report
        if: always()
        shell: bash
        run: |
          {
            echo "## Deployment Run Summary"
            echo ""
            echo "- Job status: ${{ job.status }}"
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Run ID: ${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo ""
            echo "If this run failed, inspect the first failed step in the Actions UI and expand its logs."
          } >> "$GITHUB_STEP_SUMMARY"
