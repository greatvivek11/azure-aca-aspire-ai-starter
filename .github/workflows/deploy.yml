name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZD_ENVIRONMENT_NAME: ${{ secrets.AZD_ENVIRONMENT_NAME || 'copilot-sk-azure' }}
  SQL_PROVISIONING_MODE: ${{ secrets.SQL_PROVISIONING_MODE || 'provision' }}
  AZURE_SQL_EXISTING_SERVER_NAME: ${{ secrets.AZURE_SQL_EXISTING_SERVER_NAME || '' }}
  AZURE_SQL_EXISTING_DATABASE_NAME: ${{ secrets.AZURE_SQL_EXISTING_DATABASE_NAME || '' }}

jobs:
  validate:
    name: Validate and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies
        run: dotnet restore copilot-sk.sln

      - name: Build Backend
        run: dotnet build copilot-sk.sln --configuration Release --no-restore

      - name: Run Architecture Tests
        run: dotnet test src/Backend.Tests/Backend.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Build Frontend
        working-directory: src/frontend
        run: |
          npm install
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            src/backend/bin/Release/
            src/frontend/dist/
            src/aspire/bin/Release/
            src/worker/bin/Release/

  deploy:
    name: Deploy to Azure
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Log in to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Verify Azure CLI context
        run: az account show --output table

      - name: Validate Azure Environment
        run: |
          bash scripts/validate-azure-env.sh \
            "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            "aihub-rg"

      - name: Validate SQL admin login format
        shell: bash
        env:
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
        run: |
          set -euo pipefail

          if [ -z "${AZURE_SQL_ADMIN_LOGIN:-}" ]; then
            echo "AZURE_SQL_ADMIN_LOGIN secret is required."
            exit 1
          fi

          login_lower="$(echo "${AZURE_SQL_ADMIN_LOGIN}" | tr '[:upper:]' '[:lower:]')"

          # Azure SQL rejects commonly reserved admin names.
          case "${login_lower}" in
            admin|administrator|sa|root|guest|public)
              echo "AZURE_SQL_ADMIN_LOGIN '${AZURE_SQL_ADMIN_LOGIN}' is reserved/invalid for Azure SQL."
              echo "Use a non-reserved value like 'sqladmincopilot'."
              exit 1
              ;;
          esac

          if ! echo "${AZURE_SQL_ADMIN_LOGIN}" | grep -Eq '^[A-Za-z][A-Za-z0-9_]{2,127}$'; then
            echo "AZURE_SQL_ADMIN_LOGIN must start with a letter and contain only letters, digits, or underscore (3-128 chars)."
            exit 1
          fi

      - name: Validate SQL provisioning mode inputs
        shell: bash
        env:
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
          AZURE_SQL_EXISTING_SERVER_NAME: ${{ env.AZURE_SQL_EXISTING_SERVER_NAME }}
          AZURE_SQL_EXISTING_DATABASE_NAME: ${{ env.AZURE_SQL_EXISTING_DATABASE_NAME }}
        run: |
          set -euo pipefail

          mode_lower="$(echo "${SQL_PROVISIONING_MODE:-provision}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${mode_lower}" != "provision" && "${mode_lower}" != "existing" ]]; then
            echo "SQL_PROVISIONING_MODE must be 'provision' or 'existing'."
            exit 1
          fi

          if [[ "${mode_lower}" == "existing" ]]; then
            if [[ -z "${AZURE_SQL_EXISTING_SERVER_NAME:-}" || -z "${AZURE_SQL_EXISTING_DATABASE_NAME:-}" ]]; then
              echo "When SQL_PROVISIONING_MODE=existing, set AZURE_SQL_EXISTING_SERVER_NAME and AZURE_SQL_EXISTING_DATABASE_NAME."
              exit 1
            fi
          fi

          echo "SQL provisioning mode validated: ${mode_lower}"

      - name: Provision Infrastructure with Azure Developer CLI
        run: azd provision --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
          AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
          AZURE_SQL_ENTRA_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ENTRA_ADMIN_LOGIN || '' }}
          AZURE_SQL_ENTRA_ADMIN_OBJECT_ID: ${{ secrets.AZURE_SQL_ENTRA_ADMIN_OBJECT_ID || '' }}
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
          AZURE_SQL_EXISTING_SERVER_NAME: ${{ env.AZURE_SQL_EXISTING_SERVER_NAME }}
          AZURE_SQL_EXISTING_DATABASE_NAME: ${{ env.AZURE_SQL_EXISTING_DATABASE_NAME }}

      - name: Configure Backend SQL Connection in ACA
        shell: bash
        env:
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
          AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
          AZURE_SQL_EXISTING_SERVER_NAME: ${{ env.AZURE_SQL_EXISTING_SERVER_NAME }}
          AZURE_SQL_EXISTING_DATABASE_NAME: ${{ env.AZURE_SQL_EXISTING_DATABASE_NAME }}
        run: |
          set -euo pipefail

          RG_NAME="$(azd env get-value AZURE_RESOURCE_GROUP)"
          BACKEND_APP_NAME="$(azd env get-value BACKEND_CONTAINER_APP_NAME)"

          mode_lower="$(echo "${SQL_PROVISIONING_MODE:-provision}" | tr '[:upper:]' '[:lower:]')"
          SQL_SERVER_NAME="$(azd env get-value AZURE_SQL_SERVER_NAME || true)"
          SQL_DATABASE_NAME="$(azd env get-value AZURE_SQL_DATABASE_NAME || true)"

          if [[ -z "${SQL_SERVER_NAME}" || "${mode_lower}" == "existing" ]]; then
            SQL_SERVER_NAME="${AZURE_SQL_EXISTING_SERVER_NAME:-${SQL_SERVER_NAME}}"
          fi

          if [[ -z "${SQL_DATABASE_NAME}" || "${mode_lower}" == "existing" ]]; then
            SQL_DATABASE_NAME="${AZURE_SQL_EXISTING_DATABASE_NAME:-${SQL_DATABASE_NAME}}"
          fi

          if [[ -z "${SQL_SERVER_NAME}" || -z "${SQL_DATABASE_NAME}" ]]; then
            echo "Unable to determine SQL server/database names for backend configuration."
            echo "Set AZURE_SQL_EXISTING_SERVER_NAME and AZURE_SQL_EXISTING_DATABASE_NAME when using existing mode."
            exit 1
          fi

          # Accept either logical server name or FQDN and normalize to logical server name.
          SQL_SERVER_NAME="${SQL_SERVER_NAME%%.*}"

          SQL_ADMIN_LOGIN_TO_USE="${AZURE_SQL_ADMIN_LOGIN}"
          ACTUAL_SQL_ADMIN_LOGIN="$(az sql server show \
            --resource-group "${RG_NAME}" \
            --name "${SQL_SERVER_NAME}" \
            --query administratorLogin -o tsv 2>/dev/null || true)"

          if [[ -n "${ACTUAL_SQL_ADMIN_LOGIN}" && "${ACTUAL_SQL_ADMIN_LOGIN}" != "${AZURE_SQL_ADMIN_LOGIN}" ]]; then
            echo "AZURE_SQL_ADMIN_LOGIN does not match SQL server administratorLogin."
            echo "Using server administratorLogin '${ACTUAL_SQL_ADMIN_LOGIN}' for backend connection string."
            SQL_ADMIN_LOGIN_TO_USE="${ACTUAL_SQL_ADMIN_LOGIN}"
          fi

          SQL_HOST_SUFFIX="$(az cloud show --query suffixes.sqlServerHostname -o tsv)"

          # Escape any embedded double-quotes and quote credentials to handle special chars like ';'.
          SQL_ADMIN_LOGIN_ESCAPED="${SQL_ADMIN_LOGIN_TO_USE//\"/\"\"}"
          SQL_ADMIN_PASSWORD_ESCAPED="${AZURE_SQL_ADMIN_PASSWORD//\"/\"\"}"

          SQL_CONNECTION_STRING="Server=tcp:${SQL_SERVER_NAME}${SQL_HOST_SUFFIX},1433;Initial Catalog=${SQL_DATABASE_NAME};Persist Security Info=False;User ID=\"${SQL_ADMIN_LOGIN_ESCAPED}\";Password=\"${SQL_ADMIN_PASSWORD_ESCAPED}\";MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"

          az containerapp secret set \
            --resource-group "${RG_NAME}" \
            --name "${BACKEND_APP_NAME}" \
            --secrets sql-conn="${SQL_CONNECTION_STRING}"

          az containerapp update \
            --resource-group "${RG_NAME}" \
            --name "${BACKEND_APP_NAME}" \
            --set-env-vars ConnectionStrings__SqlServer=secretref:sql-conn

      - name: Install sqlcmd client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev

      - name: Test SQL Connectivity
        shell: bash
        env:
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
          AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
          SQL_PROVISIONING_MODE: ${{ env.SQL_PROVISIONING_MODE }}
          AZURE_SQL_EXISTING_SERVER_NAME: ${{ env.AZURE_SQL_EXISTING_SERVER_NAME }}
          AZURE_SQL_EXISTING_DATABASE_NAME: ${{ env.AZURE_SQL_EXISTING_DATABASE_NAME }}
        run: |
          set -euo pipefail

          echo "::group::Resolve SQL target"

          RG_NAME="$(azd env get-value AZURE_RESOURCE_GROUP)"
          
          mode_lower="$(echo "${SQL_PROVISIONING_MODE:-provision}" | tr '[:upper:]' '[:lower:]')"
          SQL_SERVER_NAME="$(azd env get-value AZURE_SQL_SERVER_NAME || true)"
          SQL_DATABASE_NAME="$(azd env get-value AZURE_SQL_DATABASE_NAME || true)"

          if [[ -z "${SQL_SERVER_NAME}" || "${mode_lower}" == "existing" ]]; then
            SQL_SERVER_NAME="${AZURE_SQL_EXISTING_SERVER_NAME:-${SQL_SERVER_NAME}}"
          fi

          if [[ -z "${SQL_DATABASE_NAME}" || "${mode_lower}" == "existing" ]]; then
            SQL_DATABASE_NAME="${AZURE_SQL_EXISTING_DATABASE_NAME:-${SQL_DATABASE_NAME}}"
          fi

          if [[ -z "${SQL_SERVER_NAME}" || -z "${SQL_DATABASE_NAME}" ]]; then
            echo "Unable to determine SQL server/database names for connectivity test."
            exit 1
          fi

          SQL_SERVER_NAME="${SQL_SERVER_NAME%%.*}"

          SQL_ADMIN_LOGIN_TO_USE="${AZURE_SQL_ADMIN_LOGIN}"
          ACTUAL_SQL_ADMIN_LOGIN="$(az sql server show \
            --resource-group "${RG_NAME}" \
            --name "${SQL_SERVER_NAME}" \
            --query administratorLogin -o tsv 2>/dev/null || true)"

          if [[ -n "${ACTUAL_SQL_ADMIN_LOGIN}" && "${ACTUAL_SQL_ADMIN_LOGIN}" != "${AZURE_SQL_ADMIN_LOGIN}" ]]; then
            SQL_ADMIN_LOGIN_TO_USE="${ACTUAL_SQL_ADMIN_LOGIN}"
          fi

          SQL_HOST_SUFFIX="$(az cloud show --query suffixes.sqlServerHostname -o tsv)"
          SQL_FQDN="${SQL_SERVER_NAME}${SQL_HOST_SUFFIX}"

          echo "Resolved SQL server: ${SQL_FQDN}"
          echo "Resolved SQL database: ${SQL_DATABASE_NAME}"
          echo "Resolved SQL login: ${SQL_ADMIN_LOGIN_TO_USE}"
          echo "::endgroup::"

          echo "Testing SQL connectivity to ${SQL_FQDN}/${SQL_DATABASE_NAME} as ${SQL_ADMIN_LOGIN_TO_USE}..."

          SQLCMD_PATH="/opt/mssql-tools18/bin/sqlcmd"
          if [[ ! -x "${SQLCMD_PATH}" ]]; then
            echo "❌ sqlcmd is not installed at ${SQLCMD_PATH}."
            exit 1
          fi

          if ! "${SQLCMD_PATH}" -S "${SQL_FQDN},1433" -d "${SQL_DATABASE_NAME}" -U "${SQL_ADMIN_LOGIN_TO_USE}" -P "${AZURE_SQL_ADMIN_PASSWORD}" -Q "SELECT @@VERSION;" -b 2>&1 | head -20; then
            echo ""
            echo "❌ SQL connectivity test FAILED."
            echo "Verify that:"
            echo "  - AZURE_SQL_ADMIN_LOGIN matches the SQL server admin login: ${SQL_ADMIN_LOGIN_TO_USE}"
            echo "  - AZURE_SQL_ADMIN_PASSWORD is correct"
            echo "  - SQL server ${SQL_FQDN} is reachable and running"
            echo "  - Database ${SQL_DATABASE_NAME} exists"
            exit 1
          fi

          echo "✅ SQL connectivity test passed."

      - name: Deploy Backend Service
        run: azd deploy backend --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Reapply Backend SQL Connection Env
        shell: bash
        run: |
          set -euo pipefail
          RG_NAME="$(azd env get-value AZURE_RESOURCE_GROUP)"
          BACKEND_APP_NAME="$(azd env get-value BACKEND_CONTAINER_APP_NAME)"

          az containerapp update \
            --resource-group "${RG_NAME}" \
            --name "${BACKEND_APP_NAME}" \
            --set-env-vars ConnectionStrings__SqlServer=secretref:sql-conn

      - name: Deploy Frontend Service
        run: azd deploy frontend --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Deploy Worker Service
        run: azd deploy worker --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Get Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Environment: ${{ env.AZD_ENVIRONMENT_NAME }}"
          echo "Subscription: ${{ env.AZURE_SUBSCRIPTION_ID }}"

      - name: Notify Deployment Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Success' : '❌ Failed';
            console.log(`Deployment ${status}`);

      - name: Deployment Summary Report
        if: always()
        shell: bash
        run: |
          {
            echo "## Deployment Run Summary"
            echo ""
            echo "- Job status: ${{ job.status }}"
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Run ID: ${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo ""
            echo "If this run failed, inspect the first failed step in the Actions UI and expand its logs."
          } >> "$GITHUB_STEP_SUMMARY"
