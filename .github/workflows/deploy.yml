name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZD_ENVIRONMENT_NAME: ${{ secrets.AZD_ENVIRONMENT_NAME || 'copilot-maf-sbx' }}

jobs:
  validate:
    name: Validate and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies
        run: dotnet restore copilot-sk.sln

      - name: Build Backend
        run: dotnet build copilot-sk.sln --configuration Release --no-restore

      - name: Run Architecture Tests
        run: dotnet test src/Backend.Tests/Backend.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Build Frontend
        working-directory: src/frontend
        run: |
          npm install
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            src/backend/bin/Release/
            src/frontend/dist/
            src/aspire/bin/Release/
            src/worker/bin/Release/

  deploy:
    name: Deploy to Azure
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Log in to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure azd to use Azure CLI auth
        run: azd config set auth.useAzCliAuth true

      - name: Verify Azure CLI context
        run: az account show --output table

      - name: Validate Azure Environment
        run: |
          bash scripts/validate-azure-env.sh \
            "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            "aihub-rg"

      - name: Validate SQL admin login format
        shell: bash
        env:
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
        run: |
          set -euo pipefail

          if [ -z "${AZURE_SQL_ADMIN_LOGIN:-}" ]; then
            echo "AZURE_SQL_ADMIN_LOGIN secret is required."
            exit 1
          fi

          login_lower="$(echo "${AZURE_SQL_ADMIN_LOGIN}" | tr '[:upper:]' '[:lower:]')"

          # Azure SQL rejects commonly reserved admin names.
          case "${login_lower}" in
            admin|administrator|sa|root|guest|public)
              echo "AZURE_SQL_ADMIN_LOGIN '${AZURE_SQL_ADMIN_LOGIN}' is reserved/invalid for Azure SQL."
              echo "Use a non-reserved value like 'sqladmincopilot'."
              exit 1
              ;;
          esac

          if ! echo "${AZURE_SQL_ADMIN_LOGIN}" | grep -Eq '^[A-Za-z][A-Za-z0-9_]{2,127}$'; then
            echo "AZURE_SQL_ADMIN_LOGIN must start with a letter and contain only letters, digits, or underscore (3-128 chars)."
            exit 1
          fi

      - name: Provision Infrastructure with Azure Developer CLI
        run: azd provision --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
          AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}

      - name: Configure Backend SQL Connection in ACA
        shell: bash
        env:
          AZURE_SQL_ADMIN_LOGIN: ${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
          AZURE_SQL_ADMIN_PASSWORD: ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          RG_NAME="$(azd env get-value AZURE_RESOURCE_GROUP)"
          BACKEND_APP_NAME="$(azd env get-value BACKEND_CONTAINER_APP_NAME)"
          SQL_SERVER_NAME="$(azd env get-value AZURE_SQL_SERVER_NAME)"
          SQL_DATABASE_NAME="$(azd env get-value AZURE_SQL_DATABASE_NAME)"
          SQL_HOST_SUFFIX="$(az cloud show --query suffixes.sqlServerHostname -o tsv)"

          SQL_CONNECTION_STRING="Server=tcp:${SQL_SERVER_NAME}${SQL_HOST_SUFFIX},1433;Initial Catalog=${SQL_DATABASE_NAME};Persist Security Info=False;User ID=${AZURE_SQL_ADMIN_LOGIN};Password=${AZURE_SQL_ADMIN_PASSWORD};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"

          az containerapp secret set \
            --resource-group "${RG_NAME}" \
            --name "${BACKEND_APP_NAME}" \
            --secrets sql-conn="${SQL_CONNECTION_STRING}"

          az containerapp update \
            --resource-group "${RG_NAME}" \
            --name "${BACKEND_APP_NAME}" \
            --set-env-vars ConnectionStrings__SqlServer=secretref:sql-conn

      - name: Deploy Backend Service
        run: azd deploy backend --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Deploy Frontend Service
        run: azd deploy frontend --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Deploy Worker Service
        run: azd deploy worker --no-prompt
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_MODEL_ID: ${{ secrets.AZURE_OPENAI_MODEL_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Get Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Environment: ${{ env.AZD_ENVIRONMENT_NAME }}"
          echo "Subscription: ${{ env.AZURE_SUBSCRIPTION_ID }}"

      - name: Notify Deployment Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Success' : '❌ Failed';
            console.log(`Deployment ${status}`);
